name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # playwall はローカルのデータ収集用途のみ。CIではブラウザDLをスキップ
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      # 道なりルート用 OpenRouteService キー（GitHub Secrets。未設定ならOSRMデモにフォールバック）
      VITE_ORS_KEY: ${{ secrets.VITE_ORS_KEY }}
      # Mapbox公開トークン（GitHub Secrets。未設定なら地図画面でトークン入力欄を表示）
      VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
